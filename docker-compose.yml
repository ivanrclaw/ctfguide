services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/ctfguide.db
      DATA_DIR: /data
    volumes:
      - sqlite-data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      VITE_API_URL: http://localhost:${PORT:-3001}/api
    depends_on:
      - api

volumes:
  sqlite-data:
